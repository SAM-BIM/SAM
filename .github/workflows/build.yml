name: Build (Windows)

on:
  push:
    branches: [ "master", "main", "sow/**" ]
  pull_request:
    branches: [ "master", "main", "sow/**" ]
  workflow_dispatch:

jobs:
  build:
    # Runs only on SAM-BIM repos (won't break upstream if merged elsewhere)
    if: github.repository_owner == 'SAM-BIM'
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        configuration: [ "Release" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Set to "recursive" only if THIS repo actually uses submodules otherwise "false"
          submodules: false

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Pick build target (.sln or .csproj)
        id: pick
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $sln = Get-ChildItem -Path . -Filter *.sln -File | Select-Object -First 1
          if ($sln) {
            "target=$($sln.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Selected solution: $($sln.Name)"
            exit 0
          }

          $csproj = Get-ChildItem -Path . -Filter *.csproj -File | Select-Object -First 1
          if ($csproj) {
            "target=$($csproj.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Selected project: $($csproj.Name)"
            exit 0
          }

          throw "No root .sln or root .csproj found to build."

      - name: Compute SAMVersion
        id: ver
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ref = if ('${{ github.event_name }}' -eq 'pull_request') { '${{ github.base_ref }}' } else { '${{ github.ref_name }}' }
          # .NET AssemblyVersion components are UInt16 (max 65535). Cap to 60000 for headroom.
          $run = ${{ github.run_number }} % 60000
          if ($ref -match 'sow/(\d{4})-Q(\d)') {
            $v = "$($Matches[1]).$($Matches[2]).$run"
            $src = "branch '$ref'"
          } else {
            $now = (Get-Date).ToUniversalTime()
            $quarter = [int][Math]::Ceiling($now.Month / 3.0)
            $v = "$($now.Year).$quarter.$run"
            $src = "date $($now.ToString('yyyy-MM-dd')) (ref '$ref' not sow/yyyy-Qx)"
          }
          Write-Host "SAMVersion = $v (from $src)"
          "samversion=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        shell: pwsh
        env:
          MSBUILDDISABLENODEREUSE: "1"
        run: |
          $ErrorActionPreference = 'Stop'
          msbuild '${{ steps.pick.outputs.target }}' `
            /t:Restore `
            /m:1 /nr:false /v:m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:SAMVersion=${{ steps.ver.outputs.samversion }} `
            /p:UseSharedCompilation=false

      - name: Build
        shell: pwsh
        env:
          MSBUILDDISABLENODEREUSE: "1"
        run: |
          $ErrorActionPreference = 'Stop'
          msbuild '${{ steps.pick.outputs.target }}' `
            /t:Rebuild `
            /m:1 /nr:false /v:m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:SAMVersion=${{ steps.ver.outputs.samversion }} `
            /p:UseSharedCompilation=false
